name: CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo check
        run: cargo check --workspace --all-targets --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --workspace --all-features

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: [stable, beta]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install ${{ matrix.rust }} toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Build RH CLI
        run: cargo build --release -p rh

  cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build RH CLI
        run: cargo build -p rh

      - name: Test CLI help commands
        run: |
          cargo run -p rh -- --help
          cargo run -p rh -- codegen --help
          cargo run -p rh -- fhirpath --help
          cargo run -p rh -- download --help

      - name: Test fhirpath CLI functionality
        run: |
          # Test FHIRPath parsing
          cargo run -p rh -- fhirpath parse "Patient.name"

          # Test FHIRPath evaluation
          cargo run -p rh -- fhirpath eval "5 + 3"

  conformance:
    name: Conformance Subset
    runs-on: ubuntu-latest
    env:
      RH_CONFORMANCE_BLOCKING: ${{ vars.RH_CONFORMANCE_BLOCKING || 'false' }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run selected conformance subset
        id: conformance
        shell: bash
        run: |
          set +e
          cargo test -p rh-validator --test conformance_quick_wins_test | tee conformance-summary.txt
          TEST_EXIT=${PIPESTATUS[0]}

          SUMMARY_LINE=$(grep -E "test result:" conformance-summary.txt | tail -n 1)
          echo "summary_line=$SUMMARY_LINE" >> "$GITHUB_OUTPUT"
          echo "test_exit=$TEST_EXIT" >> "$GITHUB_OUTPUT"

          {
            echo "## Validator Conformance Subset"
            echo ""
            echo "Command: cargo test -p rh-validator --test conformance_quick_wins_test"
            echo ""
            echo "${SUMMARY_LINE:-No summary line captured}"
          } >> "$GITHUB_STEP_SUMMARY"

          # Non-blocking by default. Set RH_CONFORMANCE_BLOCKING=true to make this gate blocking.
          if [[ "$RH_CONFORMANCE_BLOCKING" == "true" ]]; then
            exit "$TEST_EXIT"
          fi

          exit 0

      - name: Upload conformance summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-subset-summary
          path: conformance-summary.txt

      - name: Validate gating policy logic
        if: always()
        shell: bash
        run: |
          # Exercise both policy branches deterministically using a simulated failing test exit code.
          SIMULATED_TEST_EXIT=23

          for MODE in false true; do
            if [[ "$MODE" == "true" ]]; then
              ACTUAL_EXIT=$SIMULATED_TEST_EXIT
            else
              ACTUAL_EXIT=0
            fi

            EXPECTED_EXIT=0
            if [[ "$MODE" == "true" ]]; then
              EXPECTED_EXIT=$SIMULATED_TEST_EXIT
            fi

            if [[ "$ACTUAL_EXIT" -ne "$EXPECTED_EXIT" ]]; then
              echo "Gating policy mismatch for MODE=$MODE: expected $EXPECTED_EXIT, got $ACTUAL_EXIT"
              exit 1
            fi
          done

          echo "Conformance gating policy logic validated for blocking/non-blocking modes"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
